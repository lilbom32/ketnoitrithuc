name: Daily Database Backup

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily (9 AM VN)
  workflow_dispatch:

concurrency:
  group: backup
  cancel-in-progress: false

jobs:
  backup:
    name: Database Backup
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create Backup Directory
        run: mkdir -p backups/$(date +%Y/%m)

      - name: Backup Database Schema
        run: |
          pg_dump \
            --dbname="${{ secrets.SUPABASE_DB_URL }}" \
            --schema-only \
            --file=backups/$(date +%Y/%m)/schema_$(date +%Y%m%d).sql

      - name: Backup Database Data
        run: |
          pg_dump \
            --dbname="${{ secrets.SUPABASE_DB_URL }}" \
            --data-only \
            --file=backups/$(date +%Y/%m)/data_$(date +%Y%m%d).sql

      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ github.run_id }}
          path: backups/
          retention-days: 7

      - name: Upload to S3 (if configured)
        if: secrets.BACKUP_BUCKET != ''
        run: |
          aws s3 sync backups/ s3://${{ secrets.BACKUP_BUCKET }}/database/ --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-1
